name: POST Create Research Group
method: POST
url: '{{base_url}}/api/v1/groups'
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{access_token}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "codigo": "{{test_group_code}}",
      "nombre": "Grupo de Investigacion en IA",
      "descripcion": "Investigacion en inteligencia artificial y machine learning",
      "linea_investigacion": "Inteligencia Artificial",
      "facultad": "Ingenieria de Sistemas"
    }
description: Create research group. 201 on success, 409 if code exists.
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 201, 409, or 422", function () {
        pm.expect([201, 409, 422]).to.include(pm.response.code);
      });
      if (pm.response.code === 201) {
        pm.test("Created group has codigo", function () {
          pm.expect(pm.response.json()).to.have.property("codigo");
        });
      }
