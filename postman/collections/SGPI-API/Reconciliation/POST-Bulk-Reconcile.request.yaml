name: POST Bulk Reconcile
method: POST
url: '{{base_url}}/api/v1/reconciliation/bulk'
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{access_token}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "entidades": ["investigators", "projects", "publications", "theses_advisors"],
      "modo": "FULL",
      "dry_run": true
    }
description: >-
  Bulk reconcile entities. dry_run=true previews without persisting.
  200/202 with summary of matched, conflicts, quarantined counts.
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200 or 202", function () {
        pm.expect([200, 202]).to.include(pm.response.code);
      });
      if (pm.response.code === 200 || pm.response.code === 202) {
        pm.test("Reconciliation result not null", function () {
          pm.expect(pm.response.json()).to.not.be.null;
        });
      }
