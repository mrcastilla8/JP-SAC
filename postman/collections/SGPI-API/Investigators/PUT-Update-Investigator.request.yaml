name: PUT Update Investigator
method: PUT
url: '{{base_url}}/api/v1/investigators/{{test_dni}}'
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{access_token}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "telefono": "999888777",
      "especialidad": "Inteligencia Artificial",
      "grado_academico": "Doctor"
    }
description: Update investigator by DNI. 200 on success, 404 if not found.
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200, 404, or 422", function () {
        pm.expect([200, 404, 422]).to.include(pm.response.code);
      });
      if (pm.response.code === 200) {
        pm.test("Updated investigator returned", function () {
          pm.expect(pm.response.json()).to.have.property("dni");
        });
      }
