name: POST Register
method: POST
url: '{{auth_url}}/api/auth/register'
headers:
  - key: Content-Type
    value: application/json
body:
  mode: raw
  raw: |-
    {
      "email": "{{test_email}}",
      "password": "{{test_password}}"
    }
  options:
    raw:
      language: json
description: >-
  Register a new user. 201 on success, 409 if email exists, 422 on weak password.
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      const status = pm.response.code;
      pm.test("Status is 201 or 409", function () {
        pm.expect([201, 409, 422]).to.include(status);
      });
      if (status === 201) {
        pm.test("Response has email", function () {
          pm.expect(pm.response.json()).to.have.property("email");
        });
      }
      if (status === 409) {
        pm.test("Conflict detail present", function () {
          pm.expect(pm.response.json()).to.have.property("detail");
        });
      }
