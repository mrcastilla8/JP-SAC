name: GET Configuration by Key
method: GET
url: '{{base_url}}/api/v1/configuracion/{{test_config_key}}'
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{access_token}}'
description: Get config by key. 200 with clave+valor, 404 if not found.
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200 or 404", function () {
        pm.expect([200, 404]).to.include(pm.response.code);
      });
      if (pm.response.code === 200) {
        pm.test("Config has clave and valor", function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property("clave");
          pm.expect(json).to.have.property("valor");
        });
      }
