name: POST Create Report Snapshot
method: POST
url: '{{base_url}}/api/v1/reports/snapshot'
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{access_token}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "nombre": "Snapshot Junio 2024",
      "descripcion": "Estado del sistema al cierre del semestre",
      "incluir_proyectos": true,
      "incluir_investigadores": true,
      "incluir_publicaciones": true
    }
description: Create point-in-time snapshot. 201 on success with snapshot id.
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200 or 201", function () {
        pm.expect([200, 201]).to.include(pm.response.code);
      });
      if (pm.response.code === 201 || pm.response.code === 200) {
        pm.test("Snapshot has id", function () {
          pm.expect(pm.response.json()).to.have.property("id");
        });
      }
