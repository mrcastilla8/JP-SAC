name: POST Generate Report
method: POST
url: '{{base_url}}/api/v1/reports/generate'
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{access_token}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "tipo_reporte": "PROYECTOS_ACTIVOS",
      "filtros": {
        "estado": "EN_EJECUCION",
        "anio": 2024
      },
      "formato": "JSON"
    }
description: Generate a report. 200/201 on success, 422 on invalid tipo_reporte.
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200, 201, or 422", function () {
        pm.expect([200, 201, 422]).to.include(pm.response.code);
      });
      if (pm.response.code === 200 || pm.response.code === 201) {
        pm.test("Report response is not null", function () {
          pm.expect(pm.response.json()).to.not.be.null;
        });
      }
