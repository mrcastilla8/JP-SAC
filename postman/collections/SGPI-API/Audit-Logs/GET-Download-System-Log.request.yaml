name: GET Download System Log File
method: GET
url: '{{base_url}}/api/v1/logs/system/download'
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{access_token}}'
description: Download system log file. 200 with file content, 403 if not admin.
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200 or 403", function () {
        pm.expect([200, 403]).to.include(pm.response.code);
      });
      if (pm.response.code === 200) {
        pm.test("Response body is not empty", function () {
          pm.expect(pm.response.responseSize).to.be.above(0);
        });
      }
